<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Login</title>
</head>

<body class="bg-gray-900 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded shadow-md w-96">
        <h2 class="text-2xl font-medium mb-6 text-center">Acesso ao Blog</h2>
        <form id="loginForm" class="space-y-4">
            <input type="email" id="email" placeholder="digite seu email" class="w-full border p-2 rounded" required>
            <input type="password" id="password" placeholder="senha" class="w-full border p-2 rounded" required>
            <button type="submit" class="w-full bg-blue-800 text-white p-2 rounded hover:bg-blue-900">Entrar</button>
        </form>
    </div>
    <script type="module" src="/src/login.ts"></script>
</body>

</html>
